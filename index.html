<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portugiesisch Vokabel-Master 175</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --success: #16a34a;
            --success-light: #dcfce7;
            --warning: #ca8a04;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app { max-width: 700px; width: 100%; }
        .title { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .stat-num { font-size: 22px; font-weight: 700; color: var(--primary); }
        .stat-lbl { font-size: 11px; color: var(--text-sec); text-transform: uppercase; }

        .progress-box { background: white; padding: 15px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--success); transition: width 0.3s; }

        .cat-filter { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; justify-content: center; }
        .cat-btn { padding: 5px 12px; border-radius: 15px; border: 1px solid var(--border); background: white; font-size: 12px; cursor: pointer; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .card-scene { perspective: 1000px; width: 100%; height: 250px; cursor: pointer; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .card-front { background: white; }
        .card-back { background: #f1f5f9; transform: rotateY(180deg); }
        
        .card-main { font-size: 28px; font-weight: 700; text-align: center; }
        .card-sub { font-size: 16px; color: var(--success); margin-top: 10px; font-style: italic; }
        .card-de { font-size: 24px; color: var(--primary); font-weight: 700; }
        .card-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 3px 10px; border-radius: 10px; background: var(--primary-light); color: var(--primary); font-weight: 700; }

        .nav-row { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 12px 20px; border-radius: var(--radius); border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-nav { background: white; border: 1px solid var(--border); }
        .btn-known { flex: 1; background: var(--success); color: white; }
        .btn-known.is-known { background: var(--warning); }
        .btn-share { width: 100%; margin-top: 15px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

<div class="app">
    <h2 class="title">🇧🇷 Portugiesisch Vokabel-Master</h2>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-lbl">Gesamt</div></div>
        <div class="stat-card"><div class="stat-num" id="knownCount">0</div><div class="stat-lbl">Gelernt</div></div>
        <div class="stat-card"><div class="stat-num" id="pctCount">0%</div><div class="stat-lbl">Fortschritt</div></div>
    </div>

    <div class="progress-box">
        <div class="cat-filter" id="catFilter"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
        <div style="display:flex; justify-content: space-between; font-size: 12px; color: var(--text-sec);">
            <span id="progressLabel">0 / 0</span>
            <span onclick="shuffleDeck()" style="cursor:pointer; color: var(--primary);">🔀 Mischen</span>
        </div>
    </div>

    <div class="card-scene" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
            <div class="card-face card-front">
                <span class="card-badge" id="cardCat"></span>
                <span style="font-size: 10px; text-transform: uppercase; color: var(--text-sec);">🇧🇷 Portugiesisch</span>
                <div class="card-main" id="cardPt">...</div>
                <div class="card-sub" id="cardPhon"></div>
            </div>
            <div class="card-face card-back">
                <span style="font-size: 10px; text-transform: uppercase; color: var(--text-sec);">🇩🇪 Deutsch</span>
                <div class="card-de" id="cardDe">...</div>
            </div>
        </div>
    </div>

    <div class="nav-row">
        <button class="btn btn-nav" onclick="navigate(-1)">←</button>
        <button class="btn btn-known" id="btnKnown" onclick="toggleKnown()">Kenne ich!</button>
        <button class="btn btn-nav" onclick="navigate(1)">→</button>
    </div>

    <button class="btn btn-share" onclick="shareProgress()">📤 Fortschritt teilen</button>
</div>

let currentDeck = [...DATA];
let idx = 0;
let flipped = false;
let knownIds = new Set(JSON.parse(localStorage.getItem('ptKnown') || '[]'));

function initFilter() {
    const cats = ["Alle", ...new Set(DATA.map(d => d.cat))];
    const container = document.getElementById('catFilter');
    container.innerHTML = "";
    cats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (c === 'Alle' ? ' active' : '');
        btn.innerText = c;
        btn.onclick = () => filterCat(c, btn);
        container.appendChild(btn);
    });
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDeck = cat === "Alle" ? [...DATA] : DATA.filter(d => d.cat === cat);
    idx = 0;
    render();
}

function flipCard() {
    flipped = !flipped;
    document.getElementById('cardInner').classList.toggle('flipped', flipped);
}

function navigate(step) {
    idx = (idx + step + currentDeck.length) % currentDeck.length;
    flipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
    render();
}

function toggleKnown() {
    const word = currentDeck[idx].pt;
    if(knownIds.has(word)) knownIds.delete(word);
    else knownIds.add(word);
    localStorage.setItem('ptKnown', JSON.stringify([...knownIds]));
    render();
}

function shuffleDeck() {
    currentDeck.sort(() => Math.random() - 0.5);
    idx = 0;
    render();
}

function render() {
    const item = currentDeck[idx];
    document.getElementById('cardPt').innerText = item.pt;
    document.getElementById('cardPhon').innerText = item.ph;
    document.getElementById('cardDe').innerText = item.de;
    document.getElementById('cardCat').innerText = item.cat;

    const isKnown = knownIds.has(item.pt);
    const btn = document.getElementById('btnKnown');
    btn.innerText = isKnown ? "Gelernt ✓" : "Kenne ich!";
    btn.className = 'btn btn-known' + (isKnown ? ' is-known' : '');

    const total = DATA.length;
    const known = knownIds.size;
    const pct = Math.round((known/total)*100);
    document.getElementById('totalCount').innerText = total;
    document.getElementById('knownCount').innerText = known;
    document.getElementById('pctCount').innerText = pct + "%";
    document.getElementById('progressFill').style.width = pct + "%";
    document.getElementById('progressLabel').innerText = `${idx + 1} / ${currentDeck.length}`;
}

function shareProgress() {
    const total = DATA.length;
    const known = knownIds.size;
    const pct = Math.round((known/total)*100);
    const text = `🇧🇷 Portugiesisch-Fortschritt:\n✅ ${known} von ${total} Vokabeln gelernt (${pct}%)\n🚀 Trainiert mit dem Vokabel-Master!`;
    if (navigator.share) { navigator.share({ title: 'Fortschritt', text: text }); } 
    else { navigator.clipboard.writeText(text); alert("Kopiert!"); }
}

initFilter();
render();
</script>
</body>
</html>
